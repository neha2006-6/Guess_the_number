  
  
  <!DOCTYPE html>
<html>
<head>
  <title>Guess the Number Game</title>
  <style>
    body{
      background-color: beige;
      
    }
  </style>
</head>
<body>
  
  <h2>🎯 Guess a number between 1 and 10</h2>
  
  <!-- Input box for user -->
  <input type="number" id="guess" placeholder="Your guess here">
  
  <!-- Button to check guess -->
  <button onclick="checkGuess()">Check</button>
  
  <!-- Place to show result message -->
  <p id="result"></p>

  <script>
    // Step 1: Create a random number between 1 and 10
    let secretNumber = Math.floor(Math.random() * 10) + 1;

    // Step 2: Function to check user guess
    function checkGuess() {
      let userGuess = document.getElementById("guess").value; // Get input
      userGuess = Number(userGuess); // Convert to number

      // Step 3: Compare guess with secret number
      if (userGuess === secretNumber) {
        document.getElementById("result").textContent = "🎉 Correct! You guessed it!";
      } else if (userGuess < secretNumber) {
        document.getElementById("result").textContent = "Too low. Try again!";
      } else {
        document.getElementById("result").textContent = "Too high. Try again!";
      }
    }
  </script>

</body>
</html>
